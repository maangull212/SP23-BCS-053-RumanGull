name: doctor_app
description: A modern Doctor Patient Management App with SQLite local storage.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # File & Image Handling
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  path_provider: ^2.1.1

  # UI & Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.3.0
  permission_handler: ^11.1.0
  open_filex: ^4.3.4
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
