name: taskmate
description: A minimal professional task management app (Taskmate) with tasks, repeats, reminders, categories, exports, and local auth.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  intl: ^0.19.0
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.3
  permission_handler: ^11.3.1
  android_intent_plus: ^5.0.2
  share_plus: ^7.2.1
  pdf: ^3.11.0
  printing: ^5.12.0
  shared_preferences: ^2.3.2
  crypto: ^3.0.3
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

# Launcher icons configuration (Android only)
flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/app_icon.png
  adaptive_icon_foreground: assets/icons/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  # adaptive_icon_monochrome: assets/icons/app_icon_monochrome.png